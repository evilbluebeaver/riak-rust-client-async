name: Rust

on:
  push:
    tags:
      - "*"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: ryohidaka/action-cargo-publish@v0.1.0
      with:
        token: ${{ secrets.CRATES_IO_TOKEN }}
        dry-run: false
